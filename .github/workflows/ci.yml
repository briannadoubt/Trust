name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

      - name: docs autogen up-to-date
        run: cargo xtask gen-docs --check
      - name: every rule has an emission site
        run: cargo xtask check-emissions

      - name: example — Phase 0 hello
        run: |
          cargo run -p rustricted -- build examples/00-hello.rs --out /tmp/p0
          test "$(/tmp/p0)" = "hello from rustricted"

      - name: example — Phase 1 strict-clean
        run: |
          cargo run -p rustricted -- build examples/01-lints/strict-clean.rs --out /tmp/p1c
          test "$(/tmp/p1c)" = "1"

      - name: example — Phase 1 unwrap-fail (must fail with R0001)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/unwrap-fail.rs 2>&1 | tee /tmp/p1u.log
          grep -q R0001 /tmp/p1u.log

      - name: example — R0042 positional-fail (must fail with R0042)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/positional-fail.rs 2>&1 | tee /tmp/p1p.log
          grep -q R0042 /tmp/p1p.log

      - name: example — R0007 impl-trait-return-fail (must fail with R0007)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/impl-trait-return-fail.rs 2>&1 | tee /tmp/p1i.log
          grep -q R0007 /tmp/p1i.log
      - name: example — R0010 todo-fail (must fail with R0010)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/todo-fail.rs 2>&1 | tee /tmp/p1t.log
          grep -q R0010 /tmp/p1t.log
      - name: example — R0011 panic-fail (must fail with R0011)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/panic-fail.rs 2>&1 | tee /tmp/p1pa.log
          grep -q R0011 /tmp/p1pa.log
      - name: example — R0012 bool-param-fail (must fail with R0012)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/bool-param-fail.rs 2>&1 | tee /tmp/p1b.log
          grep -q R0012 /tmp/p1b.log
      - name: example — R0014 bare-index-fail (must fail with R0014)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/bare-index-fail.rs 2>&1 | tee /tmp/p1x.log
          grep -q R0014 /tmp/p1x.log

      - name: example — cargo-style activation (must fail with R0001)
        run: |
          ! cargo run -p rustricted -- check examples/01-lints/cargo-strict-unwrap-fail.rs 2>&1 | tee /tmp/p1cs.log
          grep -q R0001 /tmp/p1cs.log

      - name: example — Phase 2 pipe
        run: |
          cargo run -p rustricted -- build examples/02-pipe/chain.rs --out /tmp/p2
          test "$(/tmp/p2)" = "11"

      - name: example — Phase 3 named args
        run: |
          cargo run -p rustricted -- build examples/03-named-args/area.rs --out /tmp/p3
          test "$(/tmp/p3)" = "24 24"

      - name: example — Phase 4 effects declared
        run: |
          cargo run -p rustricted -- build examples/04-effects/declared.rs --out /tmp/p4d
          /tmp/p4d
          test "$(/tmp/p4d | tail -1)" = "42"

      - name: example — Phase 4 effects undeclared (must fail with R4001)
        run: |
          ! cargo run -p rustricted -- check examples/04-effects/undeclared.rs 2>&1 | tee /tmp/p4u.log
          grep -q R4001 /tmp/p4u.log
