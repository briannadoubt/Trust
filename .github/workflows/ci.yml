name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # RT-104: guard the declared MSRV so it can't silently regress. The whole
  # point of lowering 1.95 → 1.74 is that adopters on an older toolchain can
  # `cargo install trust-lang`; this job keeps that promise honest. If a
  # dependency bump breaks the 1.74 build, this fails and we bump deliberately.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      # No -D warnings: later toolchains add lints this pinned one doesn't have,
      # and we don't want MSRV CI to fail on lints we can't see at this version.
      - name: check on MSRV
        env:
          RUSTFLAGS: ""
        run: cargo check --workspace --all-targets --locked

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: bash scripts/fmt.sh --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

      - name: docs autogen up-to-date
        run: cargo xtask gen-docs --check
      - name: every rule has an emission site
        run: cargo xtask check-emissions

      - name: example — Phase 0 hello
        run: |
          cargo run -p trust-lang -- build examples/00-hello.rs --out /tmp/p0
          test "$(/tmp/p0)" = "hello from trust"

      - name: example — Phase 1 strict-clean
        run: |
          cargo run -p trust-lang -- build examples/01-lints/strict-clean.rs --out /tmp/p1c
          test "$(/tmp/p1c)" = "1"

      - name: example — Phase 1 unwrap-fail (must fail with R0001)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/unwrap-fail.rs 2>&1 | tee /tmp/p1u.log
          grep -q R0001 /tmp/p1u.log

      - name: example — R0042 positional-fail (must fail with R0042)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/positional-fail.rs 2>&1 | tee /tmp/p1p.log
          grep -q R0042 /tmp/p1p.log

      - name: example — R0007 impl-trait-return-fail (must fail with R0007)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/impl-trait-return-fail.rs 2>&1 | tee /tmp/p1i.log
          grep -q R0007 /tmp/p1i.log
      - name: example — R0010 todo-fail (must fail with R0010)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/todo-fail.rs 2>&1 | tee /tmp/p1t.log
          grep -q R0010 /tmp/p1t.log
      - name: example — R0011 panic-fail (must fail with R0011)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/panic-fail.rs 2>&1 | tee /tmp/p1pa.log
          grep -q R0011 /tmp/p1pa.log
      - name: example — R0012 bool-param-fail (must fail with R0012)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/bool-param-fail.rs 2>&1 | tee /tmp/p1b.log
          grep -q R0012 /tmp/p1b.log
      - name: example — R0014 bare-index-fail (must fail with R0014)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/bare-index-fail.rs 2>&1 | tee /tmp/p1x.log
          grep -q R0014 /tmp/p1x.log
      - name: example — R0017 same-type-params-fail (must fail with R0017)
        run: |
          ! cargo run -p trust-lang -- check examples/01-lints/same-type-params-fail.rs 2>&1 | tee /tmp/p1s.log
          grep -q R0017 /tmp/p1s.log

      - name: rustc wrapper — named args via cargo build
        run: |
          # Negative: cargo build without the wrapper must fail because
          # rustc rejects `make_point(x: 1, y: 2, z: 3)`.
          if (cd examples/cargo-strict-fixture && cargo build 2>/dev/null); then
            echo "FAIL: expected cargo build to reject named-arg syntax without wrapper"
            exit 1
          fi
          # Positive: with the wrapper, the lowering pass runs and rustc gets
          # the desugared positional source.
          cargo build -p trust-rustc
          WRAPPER=$(realpath target/debug/trust-rustc)
          (cd examples/cargo-strict-fixture && RUSTC_WRAPPER="$WRAPPER" cargo build)
          out=$(examples/cargo-strict-fixture/target/debug/cargo-strict-fixture)
          test "$out" = "(1, 2, 3)"

      - name: cargo trustc — one command, zero env vars (RT-80)
        run: |
          # `cargo trustc build/run` must wire the shims itself: no RUSTC_WRAPPER,
          # no RUSTDOC, no realpath. cargo-trustc locates trust-rustc/trust-rustdoc
          # as siblings in the same dir, so put all three on PATH and invoke it.
          cargo build -p cargo-trustc -p trust-rustc -p trust-rustdoc
          export PATH="$(realpath target/debug):$PATH"
          (cd examples/cargo-strict-fixture && cargo clean >/dev/null)
          # No RUSTC_WRAPPER/RUSTDOC in the env here — cargo-trustc sets them.
          out=$(cd examples/cargo-strict-fixture && env -u RUSTC_WRAPPER -u RUSTDOC cargo-trustc trust run 2>/dev/null | tail -1)
          test "$out" = "(1, 2, 3)"

      - name: cargo trustc — project-level strict, no per-file marker (RT-81)
        run: |
          # `[package.metadata.trust] strict = true` activates strict mode for
          # the whole crate; src/ has NO #![strict] / strict!{} marker.
          cargo build -p cargo-trustc -p trust-rustc -p trust-rustdoc
          export PATH="$(realpath target/debug):$PATH"
          FIX=examples/cargo-strict-config
          # Negative: plain cargo build rejects the named-arg syntax (no wrapper).
          # Clean first so cargo can't report a stale artifact as up-to-date.
          (cd "$FIX" && cargo clean >/dev/null)
          if (cd "$FIX" && cargo build 2>/dev/null); then
            echo "FAIL: expected plain cargo build to reject named-arg syntax"
            exit 1
          fi
          # Positive: cargo trustc run lowers the whole crate from the manifest
          # opt-in alone — zero env vars, zero markers.
          (cd "$FIX" && cargo clean >/dev/null)
          out=$(cd "$FIX" && env -u RUSTC_WRAPPER -u RUSTDOC cargo-trustc trust run 2>/dev/null | tail -1)
          test "$out" = "(4, 5, 6)"
          # Enforcement: a positional same-typed call must trip R0042 crate-wide,
          # proving the opt-in turns on the lints, not just syntax lowering.
          tmp=$(mktemp -d); mkdir -p "$tmp/src"; cp "$FIX/Cargo.toml" "$tmp/"
          printf 'fn make_point(x: i32, y: i32, z: i32) -> (i32, i32, i32) { (x, y, z) }\nfn main() { let p = make_point(4, 5, 6); println!("{p:?}"); }\n' > "$tmp/src/main.rs"
          if (cd "$tmp" && env -u RUSTC_WRAPPER -u RUSTDOC cargo-trustc trust build 2>/dev/null); then
            echo "FAIL: expected R0042 to reject positional same-typed call under project strict"
            exit 1
          fi
          rm -rf "$tmp"

      - name: cargo trustc — full lint set enforced at build (RT-89)
        run: |
          # The wrapper runs the same rules as `trust check`: an .unwrap()
          # in a strict crate must fail `cargo trustc build` with R0001.
          cargo build -p cargo-trustc -p trust-rustc -p trust-rustdoc
          export PATH="$(realpath target/debug):$PATH"
          tmp=$(mktemp -d); mkdir -p "$tmp/src"
          cp examples/cargo-strict-config/Cargo.toml "$tmp/"
          printf 'fn main() { let v: Option<i32> = Some(1); let _ = v.unwrap(); }\n' > "$tmp/src/main.rs"
          if (cd "$tmp" && env -u RUSTC_WRAPPER -u RUSTDOC cargo-trustc trust build 2>/tmp/rt89.log); then
            echo "FAIL: expected R0001 to reject .unwrap() under cargo trustc build"
            exit 1
          fi
          grep -q R0001 /tmp/rt89.log
          rm -rf "$tmp"

      - name: example — Phase 2 pipe
        run: |
          cargo run -p trust-lang -- build examples/02-pipe/chain.rs --out /tmp/p2
          test "$(/tmp/p2)" = "11"

      - name: rustc wrapper — multi-module crate
        run: |
          cargo build -p trust-rustc
          WRAPPER=$(realpath target/debug/trust-rustc)
          (cd examples/cargo-strict-fixture-multimod && RUSTC_WRAPPER="$WRAPPER" cargo run) \
            | grep -qx "50"

      - name: rustc wrapper — cross-file named args (RT-40)
        run: |
          # RT-40: a call in main.rs to a fn defined in sibling geom.rs must
          # resolve against the *crate-wide* registry. Pre-RT-40 the wrapper
          # only saw one file at a time, so the cross-file fn was unknown.
          # The fixture's call site uses reversed-from-declared arg order
          # to prove reordering kicks in — `make_rect(height: 5, width: 10)`
          # must produce `(10, 5)`, so `rect.0` prints `10`.
          cargo build -p trust-rustc
          WRAPPER=$(realpath target/debug/trust-rustc)
          (cd examples/cargo-strict-fixture-cross-file && RUSTC_WRAPPER="$WRAPPER" cargo run) \
            | grep -qx "10"

      - name: rustdoc wrapper — doc-tests with named-arg syntax
        run: |
          # rustdoc bypasses RUSTC_WRAPPER and invokes rustc directly on
          # each doc-test snippet. A RUSTDOC shim that lowers code blocks
          # inside `///` doc comments fixes this.
          cargo build -p trust-rustc -p trust-rustdoc
          WRAPPER=$(realpath target/debug/trust-rustc)
          RUSTDOC_SHIM=$(realpath target/debug/trust-rustdoc)
          # Negative: without RUSTDOC, named-arg doctests fail.
          (cd examples/cargo-strict-fixture-multimod && cargo clean >/dev/null)
          if (cd examples/cargo-strict-fixture-multimod \
              && RUSTC_WRAPPER="$WRAPPER" cargo test --doc 2>/dev/null); then
            echo "FAIL: expected cargo test --doc to reject named-arg doctest without RUSTDOC shim"
            exit 1
          fi
          # Positive: with RUSTDOC, doc-test snippets are lowered too.
          (cd examples/cargo-strict-fixture-multimod && cargo clean >/dev/null)
          (cd examples/cargo-strict-fixture-multimod \
            && RUSTC_WRAPPER="$WRAPPER" RUSTDOC="$RUSTDOC_SHIM" cargo test --doc) \
            | tee /tmp/rt28.log
          grep -q "2 passed" /tmp/rt28.log

      - name: rustc wrapper — cross-crate named args (trust-std)
        run: |
          # Negative: without the wrapper, rustc must reject the named-arg
          # call to a fn declared in another crate.
          if (cd examples/cargo-strict-cross-crate && cargo build 2>/dev/null); then
            echo "FAIL: expected cargo build to reject cross-crate named-arg syntax without wrapper"
            exit 1
          fi
          # Positive: with the wrapper, lowering seeds the CalleeRegistry
          # from trust-std's bundled signature index and rewrites the
          # call to positional (reordered against the real signature).
          cargo build -p trust-rustc
          WRAPPER=$(realpath target/debug/trust-rustc)
          (cd examples/cargo-strict-cross-crate && RUSTC_WRAPPER="$WRAPPER" cargo run) \
            | grep -qx "ok"

      - name: rustc wrapper — cross-crate named args via generated index (RT-66)
        run: |
          # RT-66: enforce / reorder named args on calls into an ARBITRARY
          # dependency (not the bundled trust-std), resolved against an index
          # extracted automatically with `trust index` — no hand-written shim.
          cargo build -p trust-lang -p trust-rustc
          TRUST=$(realpath target/debug/trust)
          WRAPPER=$(realpath target/debug/trust-rustc)
          # 1. Auto-extract the producer crate's public-fn signature index.
          "$TRUST" index examples/cross-crate-index/producer/src \
            -o examples/cross-crate-index/producer/trust-signatures.txt
          SIGS=$(realpath examples/cross-crate-index/producer/trust-signatures.txt)
          # 2. Enforcement gap, demonstrated: a positional swap into the
          #    dependency is silently accepted WITHOUT the index ...
          printf '#![strict]\nfn main() { let _ = producer::make_rect(1080, 1920); }\n' \
            > /tmp/rt66-swap.rs
          "$TRUST" check /tmp/rt66-swap.rs
          # ... and rejected WITH it.
          if TRUST_SIGNATURE_PATH="$SIGS" "$TRUST" check /tmp/rt66-swap.rs 2>/tmp/rt66.log; then
            echo "FAIL: expected R0042 on cross-crate positional swap with index"
            exit 1
          fi
          grep -q R0042 /tmp/rt66.log
          # 3. Reorder + compile: the named consumer builds and runs.
          (cd examples/cross-crate-index/consumer \
            && RUSTC_WRAPPER="$WRAPPER" TRUST_SIGNATURE_PATH="$SIGS" cargo run) \
            | grep -qx "2073600"

      - name: trust check --format json — agent-native diagnostics (RT-70)
        run: |
          # RT-70: machine-readable diagnostics carrying a structured fix
          # (span + replacement + applicability) an agent loop can apply.
          cargo build -p trust-lang
          TRUST=$(realpath target/debug/trust)
          printf '#![strict]\nfn make_rect(width: u32, height: u32) -> u32 { width + height }\nfn main() { let _ = make_rect(1, 2); }\n' \
            > /tmp/rt70.rs
          # JSON to stdout; the process still exits non-zero on an error diag.
          if "$TRUST" check --format json /tmp/rt70.rs > /tmp/rt70.json 2>/dev/null; then
            echo "FAIL: expected non-zero exit on R0042"
            exit 1
          fi
          python3 -c "import json; d=json.load(open('/tmp/rt70.json')); f=d['diagnostics'][0]; assert f['rule']=='R0042', f; assert f['fix']['applicability']=='hasPlaceholders', f; assert f['span']['startLine']==3, f; print('RT-70 json ok')"

      - name: example — Phase 3 named args
        run: |
          cargo run -p trust-lang -- build examples/03-named-args/area.rs --out /tmp/p3
          test "$(/tmp/p3)" = "24 24"

      - name: trust fix — vanilla→strict round-trips (RT-71)
        run: |
          # `trust fix` inserts named args at positional calls; `trust lower`
          # strips them back. The round-trip must reproduce the positional call.
          printf 'fn make_rect(width: u32, height: u32) -> u32 { width * height }\nfn main() { let _ = make_rect(1920, 1080); }\n' > /tmp/rt71.rs
          cargo run -q -p trust-lang -- fix /tmp/rt71.rs | tee /tmp/rt71-fixed.rs | grep -q 'make_rect(width: 1920, height: 1080)'
          cargo run -q -p trust-lang -- lower /tmp/rt71-fixed.rs | tr -d ' \n' | grep -q 'make_rect(1920,1080)'

      - name: trust explain — agent rule contract (RT-78)
        run: |
          # Per-rule explanation carries why + the compliant idiom.
          cargo run -q -p trust-lang -- explain R0017 | grep -q 'instead:'
          # The full catalogue is valid JSON an agent can load into context.
          cargo run -q -p trust-lang -- explain --format json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['rules'])>=15, d; assert all(r['instead'] for r in d['rules']); print('trust explain json ok')"
          # Unknown codes fail cleanly.
          if cargo run -q -p trust-lang -- explain R9999 >/dev/null 2>&1; then
            echo "FAIL: expected non-zero exit on unknown rule code"; exit 1
          fi

      - name: dogfood — strict library crates via cargo trustc (RT-82)
        run: |
          # Crates with `[package.metadata.trust] strict = true` build
          # whole-package strict through `cargo trustc`, which discovers the
          # opt-in by scanning workspace members. trust-syntax and trust-diag
          # qualify (RT-88's cfg(test) exemption keeps their test files plain);
          # the binary crates trust / trust-rustc / xtask are stage-0 plain
          # Rust (RT-76), and trust-std / trust-lsp / trust-lints stay out —
          # R0008/R0017 fire on code that is those crates' actual design
          # (macro-exporting, std-mirroring shims, visitor internals). See
          # case-studies/dogfooding.md.
          cargo build -p cargo-trustc -p trust-rustc -p trust-rustdoc
          export PATH="$(realpath target/debug):$PATH"
          # Force a real recompile: cargo fingerprints the rustc *version
          # string*, which the wrapper passes through unchanged — a cached
          # crate would otherwise skip the wrapper and make this step hollow.
          cargo clean -p trust-syntax -p trust-diag
          cargo-trustc trust build -p trust-syntax -p trust-diag

      - name: std-signatures manifest up-to-date (RT-44)
        run: |
          # The `STD_SIGNATURES` index baked into `trust-lower` is
          # generated from the checked-in
          # `crates/trust-std/std-signatures.txt` manifest, which is
          # itself regenerated from `crates/trust-std/src/lib.rs` by
          # `cargo xtask gen-std-signatures`. CI verifies the checked-in
          # manifest is fresh — stale manifests would silently break
          # cross-crate named-arg lowering. xtask is stage-0 plain Rust
          # (RT-76), so no wrapper is needed to build it.
          cargo xtask gen-std-signatures --check

