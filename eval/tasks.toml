[[task]]
id = "11-pipeline"
description = "Multi-helper data pipeline. Many call sites for local arity-2/3 fns. Bug surface: R0042 positional ordering."
bug = '(make_employee|add_employee)\s*\(\s*(?!\w+\s*:)'
good = '(make_employee|add_employee)\s*\(\s*\w+\s*:'
expected_rule = "R0042"
vanilla_prompt = """
Write a complete single-file Rust program. Output ONLY the source code,
no commentary, no markdown fences.

Define this struct and three helper functions exactly:

    struct Employee { name: String, dept: String, salary: u32 }

    fn make_employee(name: &str, dept: &str, salary: u32) -> Employee {
        Employee { name: name.to_string(), dept: dept.to_string(), salary }
    }

    fn add_employee(roster: &mut Vec<Employee>, e: Employee) {
        roster.push(e);
    }

    fn total_for_dept(roster: &[Employee], dept: &str) -> u32 {
        roster.iter().filter(|e| e.dept == dept).map(|e| e.salary).sum()
    }

In `fn main()`:
1. Build an empty `Vec<Employee>`.
2. Add five employees via `make_employee` + `add_employee`:
   - Alice in Eng earning 90000
   - Bob in Eng earning 85000
   - Carol in Sales earning 70000
   - Dave in Sales earning 72000
   - Eve in Ops earning 80000
3. Print `Eng total: <n>` and `Sales total: <n>` using `total_for_dept`.

Use only std. Compile with `rustc`.
"""
rustricted_prompt = """
Write a complete single-file program in the Rustricted dialect.
Rustricted is Rust with `#![strict]` at the top of the file, which
enables an additional set of static checks. Apart from `#![strict]`,
write idiomatic Rust.

Output ONLY the source code, no commentary, no markdown fences. The
first line must be `#![strict]`.

Define this struct and three helper functions exactly:

    struct Employee { name: String, dept: String, salary: u32 }

    fn make_employee(name: &str, dept: &str, salary: u32) -> Employee {
        Employee { name: name.to_string(), dept: dept.to_string(), salary }
    }

    fn add_employee(roster: &mut Vec<Employee>, e: Employee) {
        roster.push(e);
    }

    fn total_for_dept(roster: &[Employee], dept: &str) -> u32 {
        roster.iter().filter(|e| e.dept == dept).map(|e| e.salary).sum()
    }

In `fn main()`:
1. Build an empty `Vec<Employee>`.
2. Add five employees via `make_employee` + `add_employee`:
   - Alice in Eng earning 90000
   - Bob in Eng earning 85000
   - Carol in Sales earning 70000
   - Dave in Sales earning 72000
   - Eve in Ops earning 80000
3. Print `Eng total: <n>` and `Sales total: <n>` using `total_for_dept`.
"""

