# Each [[task]] is one row of the eval matrix. The same task is run twice —
# once with `vanilla_prompt`, once with `rustricted_prompt` — so we can
# attribute differences to the dialect, not the task wording.
#
# `bug` and `good` are Python regexes applied to the agent's raw output.
# `expected_rule` is the Rustricted rule code that should catch the bug
# when present; the scorer counts a bug as "caught" if that code appears
# in the `rustricted check` stderr.

[[task]]
id = "01-duration"
description = "Build a Duration via a local 2-arg helper. Bug: positional ordering."
bug = 'make_duration\s*\(\s*60\b'
good = 'make_duration\s*\(\s*secs\s*:'
expected_rule = "R0042"
vanilla_prompt = """
Write a single-file Rust program. Output ONLY the source code — no
commentary, no markdown fences. Your response must begin with the first
line of the .rs file.

The program must:

1. Define this function exactly:

   fn make_duration(secs: u64, nanos: u32) -> std::time::Duration {
       std::time::Duration::new(secs, nanos)
   }

2. In `fn main()`, call `make_duration` to build a Duration of 60 seconds
   and 500 nanoseconds, bind it to `dur`, and print it with
   `println!("{:?}", dur);`.

3. Compile with `rustc <file>` and use only std.
"""
rustricted_prompt = """
Write a single-file program in the Rustricted dialect. Rustricted is
Rust with `#![strict]` at the top of the file, which enables stricter
checks (notably: calls to locally-defined functions with more than one
argument must use named arguments — `f(name: value, name: value)`).
Apart from that, write idiomatic Rust.

Output ONLY the source code — no commentary, no markdown fences. The
first line of your response must be `#![strict]`.

The program must:

1. Start with `#![strict]`.

2. Define this function exactly:

   fn make_duration(secs: u64, nanos: u32) -> std::time::Duration {
       std::time::Duration::new(secs, nanos)
   }

3. In `fn main()`, call `make_duration` to build a Duration of 60 seconds
   and 500 nanoseconds, bind it to `dur`, and print it with
   `println!("{:?}", dur);`.
"""

