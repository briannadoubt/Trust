Apart from that, write idiomatic Rust.

Output ONLY the source code â€” no commentary, no markdown fences. The
first line of your response must be `#![strict]`.

The program must:

1. Start with `#![strict]`.

2. Define this function exactly:

   fn make_duration(secs: u64, nanos: u32) -> std::time::Duration {
